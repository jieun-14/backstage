# apps/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: actions-runner
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jieun-14/backstage.git
    targetRevision: main
    path: projects/actions-runner
  destination:
    server: https://kubernetes.default.svc
    namespace: actions-runner
  syncPolicy:
    automated: false
    syncOptions:
      - CreateNamespace=true
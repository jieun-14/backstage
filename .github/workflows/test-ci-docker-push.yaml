name: CI - Docker Build & Push

on:
  push:
    paths:
      - python-app/src/**
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./python-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backstage:python-app-${{ github.sha }}

      - name: Print Image Info
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Registry : docker.io"
          echo "🏷️  Image    : ${{ secrets.DOCKERHUB_USERNAME }}/backstage"
          echo "🔖 Tag      : python-app-${{ github.sha }}"
          echo "🔗 Full URL : docker.io/${{ secrets.DOCKERHUB_USERNAME }}/backstage:python-app-${{ github.sha }}"




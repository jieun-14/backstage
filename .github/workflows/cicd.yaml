name: CI/CD - Build, Push & Deploy

on:
  push:
    branches:
      - main
    paths:
      - python-app/src/**

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./python-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backstage:python-app-${{ github.sha }}

      - name: Print Image Info
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Registry : docker.io"
          echo "🏷️  Image    : ${{ secrets.DOCKERHUB_USERNAME }}/backstage"
          echo "🔖 Tag      : python-app-${{ github.sha }}"
          echo "🔗 Full URL : docker.io/${{ secrets.DOCKERHUB_USERNAME }}/backstage:python-app-${{ github.sha }}"

  cd:
    runs-on: self-hosted
    needs: ci   # ci 가 성공해야 cd 실행

    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-arm64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          # 클러스터 내부 argocd에서 다운

      - name: ArgoCD Login
        run: |
          argocd login https://argocd-server.argocd \
            --username admin \
            --password SpXaqw0ZemPXH1wf \
            --insecure

      - name: ArgoCD App Sync
        run: |
          argocd app sync python-app










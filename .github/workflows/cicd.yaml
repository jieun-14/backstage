name: CI/CD - Build, Push & Deploy

on:
  push:
    branches:
      - main
    paths:
      - python-app/src/**

jobs:
  ci:
    outputs:
      commit_id: ${{ steps.set-sha.outputs.short_sha }}
      # 같은 Job 내부의 스텝끼리는 $GITHUB_ENV 를 사용해도 되지만
      # GitHub Actions 구조상, Job 레벨의 outputs는 개별 Step들의 output(steps.<step_id>.outputs.*)에서만 값을 가져올 수 있도록 설계되어
      # 컨테이너 밖(Job 레벨)으로 값을 내보낼 때는 반드시 스텝의 output을 거쳐야 한다
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: set-sha
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "COMMIT_ID=$SHORT_SHA" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./python-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backstage:python-app-${{ env.COMMIT_ID }}

      - name: Print Image Info
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Registry : docker.io"
          echo "🏷️  Image    : ${{ secrets.DOCKERHUB_USERNAME }}/backstage"
          echo "🔖 Tag      : python-app-${{ env.COMMIT_ID }}"
          echo "🔗 Full URL : docker.io/${{ secrets.DOCKERHUB_USERNAME }}/backstage:python-app-${{ env.COMMIT_ID }}"

  cd:
    runs-on: self-hosted
    needs: ci   # ci 가 성공해야 cd 실행
    permissions:
      contents: write
    env:
      COMMIT_ID: ${{ needs.ci.outputs.commit_id }}

    steps:
      - name: Checkout                                # values.yaml 파일 수정을 위해 필요
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tag in values.yaml         # values.yaml의 tag를 현재 SHA로 교체
        run: |
          sed -i "s|tag: \"python-app-.*\"|tag: \"python-app-${{ env.COMMIT_ID }}\"|" python-app/charts/python-app/values.yaml
          # sed 와 yq 의 차이점?
          echo "✅ Updated image tag to: python-app-${{ env.COMMIT_ID }}"

      - name: Commit and Push values.yaml             # values.yaml을 git에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python-app/charts/python-app/values.yaml
          git commit -m "chore: update python-app image tag to python-app-${{ env.COMMIT_ID }}"
          git push

      - name: Install ArgoCD CLI
        run: |
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-arm64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd
          # 클러스터 내부 argocd에서 다운

      - name: ArgoCD Login
        run: |
          argocd login argocd-server.argocd \
            --username admin \
            --password SpXaqw0ZemPXH1wf \
            --insecure

      - name: ArgoCD App Sync
        run: |
          argocd app sync python-app









